lass="line">    let startTime = new Date().getTime();</div><div class="line">    let dataSource = data;</div><div class="line">    let res = [];</div><div class="line">    return (function dfs(data) &#123;</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 先压入 dataSource 的第一个元素，</div><div class="line">         * 如果该元素有 child ，则继续压入，重复到没有 child 为止</div><div class="line">         */</div><div class="line">        res.push(data);</div><div class="line">        if (data.child) &#123;</div><div class="line">            return dfs(data.child.shift());</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 开始遍历 res，从 res 的最后一个元素开始匹配目标，</div><div class="line">         * 如果目标存在，返回目标，不再匹配</div><div class="line">         */</div><div class="line">        if (res[res.length - 1].name == goal) &#123;</div><div class="line">            let result = [];</div><div class="line">            let endTime = new Date().getTime();</div><div class="line">            let duration = (endTime - startTime) / 1000; // 搜索速度</div><div class="line">            result.unshift(res[res.length - 1].id, res[res.length - 1].name, res[res.length - 1].child, duration)</div><div class="line">            return result</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 需要注意的是，如果没有匹配到结果，</div><div class="line">         * 则弹出 res 的最后一个元素，该元素是倒数第二个元素的 child，</div><div class="line">         * 因此在后续步骤需要删除倒数第二个元素的 child 中对应的这个 res.pop() 元素</div><div class="line">         */</div><div class="line">        res.pop();</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 如果 res 数组没有剩余元素，并且 dataSource 还有剩余元素，</div><div class="line">         * 那么 res 继续压入 dataSource 的剩余元素，</div><div class="line">         * 否则返回 null</div><div class="line">         */</div><div class="line">        if (res.length &lt; 1) &#123;</div><div class="line">            return (dataSource.length &gt; 0 ?</div><div class="line">                dfs(dataSource.shift()) : null)</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 因为 res 没有匹配到目标，</div><div class="line">         * 删除 res[res.length -1].child 即 lastNode.child</div><div class="line">         */</div><div class="line">        let lastNode = res[res.length - 1];</div><div class="line">        lastNode.child.shift();</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 当 lastNode.child 没有剩余元素时，</div><div class="line">         * 删除 lastNode.child，继续匹配 res 弹出（最后一个）的元素</div><div class="line">         */</div><div class="line">        if (lastNode.child.length &lt; 1) &#123;</div><div class="line">            delete lastNode.child</div><div class="line">            return dfs(res.pop());</div><div class="line">        &#125;</div><div class="line"></div><div class="line">        /**</div><div class="line">         * 删除 lastNode.child 第一个元素后，继续匹配 lastNode.child[0]</div><div class="line">         */</div><div class="line">        return dfs(lastNode.child[0])</div><div class="line"></div><div class="line">    &#125;)(dataSource.shift())</div><div class="line">&#125;;</div><div class="line">console.log(&apos;findPathDFS: &apos; + findPathDFS(home.child, &apos;惠东县&apos;)</div></pre></td></tr></table></figure>
